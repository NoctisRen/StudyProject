# =============================================================================
# Phase 2: Tests - 自动化测试
# 触发条件：push 到 main/develop + PR 到 main
# =============================================================================
name: Tests

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  NODE_VERSION: 24

jobs:
  # ── Job 1: 单元测试（不需要数据库） ─────────────────────────────────────────
  unit:
    name: 单元测试
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - run: npm ci

      - name: Run unit tests
        run: npx jest tests/unit --ci --verbose
        env:
          JWT_SECRET: test-secret-for-ci-only

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-unit
          path: coverage/
          if-no-files-found: ignore

  # ── Job 2: 集成测试（需要临时 MongoDB） ────────────────────────────────────
  integration:
    name: 集成测试
    runs-on: ubuntu-latest
    services:
      mongo:
        image: mongo:7
        ports:
          - 27017:27017
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - run: npm ci

      - name: Check MongoDB connectivity
        run: |
          echo "Checking MongoDB connectivity..."
          node -e "
            const { MongoClient } = require('mongodb');
            const url = 'mongodb://localhost:27017/test-my-employees';
            console.log('Connecting to:', url);
            const client = new MongoClient(url, { serverSelectionTimeoutMS: 15000 });
            client.connect()
              .then(() => client.db().admin().ping())
              .then((r) => { console.log('MongoDB ping OK:', r); return client.close(); })
              .then(() => process.exit(0))
              .catch((e) => { console.error('MongoDB connection failed:', e.message); process.exit(1); });
          "

      - name: Run integration tests
        run: npx jest tests/integration --ci --verbose --forceExit 2>&1 | tee jest-output.txt
        env:
          NODE_ENV: test
          DB_URL: mongodb://localhost:27017/test-my-employees
          JWT_SECRET: test-secret-for-ci-only

      - name: Upload jest output
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: jest-integration-output
          path: jest-output.txt
